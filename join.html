<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Join a film · Films</title>
<meta name="description" content="You've been invited to a film on Films — open the app and enter the code to start shooting." />
<meta name="theme-color" content="#0A0807" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0A0807; --surface:#1C1813; --brass:#E6B450; --brass-deep:#1A1206;
    --cream:#F4ECDD; --muted:#A89C88; --hair:rgba(245,232,210,.10);
    --display:"Instrument Serif",Georgia,serif;
    --body:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:"Space Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);color:var(--cream);min-height:100svh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:28px;
    background:radial-gradient(120% 70% at 50% -10%, #18130D 0%, #0A0807 48%, #060504 100%) fixed;}
  .spark{width:26px;height:26px;display:inline-block;vertical-align:-.18em;margin-right:8px;}
  .brandrow{font-family:var(--display);font-size:30px;letter-spacing:.3px;margin-bottom:30px;}
  .eyebrow{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--brass);}
  h1{font-family:var(--display);font-weight:400;font-size:clamp(34px,9vw,46px);line-height:1.05;margin-top:10px;letter-spacing:-.5px;}
  p.lead{color:var(--muted);font-size:17px;margin-top:14px;max-width:420px;}
  .codecard{margin:30px auto 0;max-width:380px;width:100%;background:var(--surface);
    border:1px solid var(--hair);border-radius:22px;padding:26px 22px;}
  .codelabel{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);}
  .code{font-family:var(--mono);font-weight:700;font-size:clamp(38px,11vw,52px);letter-spacing:10px;
    color:var(--brass);margin:10px 0 4px;}
  .hint{color:var(--muted);font-size:14px;line-height:1.5;margin-top:8px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:26px;
    font-weight:700;font-size:16px;border:0;cursor:pointer;border-radius:999px;padding:15px 30px;
    color:var(--brass-deep);background:var(--brass);box-shadow:0 14px 32px rgba(230,180,80,.24);text-decoration:none;}
  .btn:active{transform:translateY(1px);}
  .copy{margin-top:14px;background:transparent;border:1px solid var(--hair);color:var(--cream);
    border-radius:999px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--body);}
  .copied{color:var(--brass);}
  .foot{margin-top:30px;color:var(--muted);font-size:14px;}
  .foot a{color:var(--brass);text-decoration:none;}
</style>
</head>
<body>
  <div class="brandrow"><svg class="spark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 2 C53 30 70 47 98 50 C70 53 53 70 50 98 C47 70 30 53 2 50 C30 47 47 30 50 2 Z" fill="#E6B450"/></svg>Films</div>

  <span class="eyebrow">You're invited</span>
  <h1>Join the film.</h1>
  <p class="lead">Someone added you to a film on <strong style="color:var(--cream)">Films</strong> — the shared disposable camera. Open the app to shoot into it.</p>

  <div class="codecard">
    <div class="codelabel">SHARE CODE</div>
    <div class="code" id="code">— — —</div>
    <div class="hint" id="hint">Open <strong>✱ Films › Join</strong> and enter this code to start shooting.</div>
    <a class="btn" id="openBtn" href="#">Open in Films</a><br>
    <button class="copy" id="copyBtn" type="button">Copy code</button>
  </div>

  <div class="foot">Don't have Films yet? <a href="index.html">Get it here →</a></div>

<script>
  // Pull the code from ?code=XXXX  (also tolerates  #XXXX  or  /join/XXXX)
  function readCode() {
    const p = new URLSearchParams(location.search);
    let c = (p.get("code") || location.hash.replace(/^#/, "") || "").trim();
    if (!c) { const m = location.pathname.match(/join\/([A-Za-z0-9]{4,12})/); if (m) c = m[1]; }
    return c.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 12);
  }
  const code = readCode();
  const openBtn = document.getElementById("openBtn");
  const copyBtn = document.getElementById("copyBtn");

  if (code) {
    document.getElementById("code").textContent = code;
    // Deep link into the app (scheme registered app-side). Falls back to the
    // landing page after a moment if the app isn't installed.
    openBtn.setAttribute("href", "films://join/" + code);
    openBtn.addEventListener("click", () => {
      const t = setTimeout(() => { location.href = "index.html"; }, 1500);
      window.addEventListener("pagehide", () => clearTimeout(t), { once: true });
    });
    copyBtn.addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(code); copyBtn.textContent = "Copied ✓"; copyBtn.classList.add("copied"); }
      catch { copyBtn.textContent = code; }
    });
  } else {
    // No code in the link — still useful: send them into the app's Join screen.
    document.getElementById("code").textContent = "✱";
    document.getElementById("hint").innerHTML = "Open <strong>✱ Films › Join</strong> and enter the code your host shared.";
    openBtn.setAttribute("href", "films://join");
    copyBtn.style.display = "none";
  }
</script>
</body>
</html>
